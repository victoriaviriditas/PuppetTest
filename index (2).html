<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marionette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- full-bleed webcam is the stage -->
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>

  <!-- ultra-minimal HUD -->
  <header class="chrome">
    <span class="wordmark">Marionette</span>
    <span class="tag" id="status">tap to begin</span>
  </header>

  <footer class="chrome bottom">
    <span class="hint" id="hint">left hand → knight · right hand → jester</span>
  </footer>

  <!-- start overlay -->
  <div class="start-overlay" id="startOverlay">
    <button class="start-btn" id="startBtn">
      <span class="start-btn__icon">
        <svg viewBox="0 0 32 32" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="16" cy="16" r="14" />
          <polygon points="13,10 24,16 13,22" fill="currentColor" stroke="none"/>
        </svg>
      </span>
      <span class="start-btn__text">Begin</span>
    </button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
